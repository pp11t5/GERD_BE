name: CI

on:
  pull_request:
    branches:
      - main
jobs:
  # ✔ 빠르게 컴파일만 체크하는 build job
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build -x test --no-daemon
  # ✔ build 성공해야 실행되는 test job
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test --no-daemon