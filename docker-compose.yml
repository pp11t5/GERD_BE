services:
  # PostgreSQL local verification DB
  # JDBC: jdbc:postgresql://localhost:5432/gerd
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gerd
      POSTGRES_USER: gerd
      POSTGRES_PASSWORD: gerd
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
