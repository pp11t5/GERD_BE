server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: gerd

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:259200000}

kakao:
  native-app-key: ${KAKAO_NATIVE_APP_KEY:}
  iss: ${KAKAO_ISS:}
  jwks-url: ${KAKAO_JWKS_URL:}
  admin-key: ${KAKAO_ADMIN_KEY:}

sentry:
  dsn: ${SENTRY_DSN:}
  exception-resolver-order: -2147483647
  max-request-body-size: always
  send-default-pii: false
  traces-sample-rate: 0.0

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
