server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: gerd
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:259200000}

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  project-id: ${FIREBASE_PROJECT_ID:}

notification:
  scheduler:
    enabled: false

kakao:
  native-app-key: ${KAKAO_NATIVE_APP_KEY:}
  iss: ${KAKAO_ISS:}
  jwks-url: ${KAKAO_JWKS_URL:}
  admin-key: ${KAKAO_ADMIN_KEY:}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  connect-timeout-ms: ${GEMINI_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${GEMINI_READ_TIMEOUT_MS:15000}

sentry:
  dsn: ${SENTRY_DSN:}
  exception-resolver-order: -2147483647
  max-request-body-size: always
  send-default-pii: false
  traces-sample-rate: 0.0

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
