spring:
  # Testcontainers가 jdbc:tc 드라이버로 PostgreSQL 컨테이너를 자동 기동/공유한다 (JVM당 1개)
  datasource:
    url: jdbc:tc:postgresql:16:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  # @DataJpaTest가 임베디드 H2로 대체하지 않고 위 datasource를 그대로 쓰게 한다
  test:
    database:
      replace: none

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMzItYnl0ZXMhIQ==
  access-expiration-ms: 3600000
  refresh-expiration-ms: 259200000

r2:
  credentials:
    access-key: test-access-key
    secret-key: test-secret-key
  endpoint: https://test.r2.local
  bucket: test-bucket

sentry:
  dsn:
  exception-resolver-order: -2147483647
  max-request-body-size: always
  send-default-pii: false
  traces-sample-rate: 0.0

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
